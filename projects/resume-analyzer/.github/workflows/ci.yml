name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-build:
    name: Java backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Build with Maven
        run: cd java-backend && mvn clean package -DskipTests

  python-lint:
    name: Python ML service lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: cd python-ml && pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile python-ml/app/main.py && echo "Syntax OK"

  docker-compose-validate:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config
